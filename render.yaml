services:
  - type: web
    name: stock-edge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AV_KEY
        sync: false
      - key: TWELVEDATA_KEY
        sync: false
      - key: FINNHUB_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: API_KEYS
        sync: false
      - key: RATE_LIMIT
        value: "100"
